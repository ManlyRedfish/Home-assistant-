# =============================================================================
# MOOSE HOUSE CLIMATE — COMPLETE CONFIGURATION.YAML
# Last Updated: April 16, 2026
# Architecture: V3.1 — Audited Truth / Smoothed / Control
# =============================================================================
#
# ⚠️  LLM INSTRUCTION: This file contains MULTIPLE independent sections.
#     If you are editing ONE section, DO NOT delete or modify other sections.
#     Each section is marked with a block header. Preserve all blocks intact.
#     If you are rewriting this file, include ALL sections below or you will
#     break truth sensors, smoothing, runtime tracking, or control wrappers.
#
# SECTIONS IN THIS FILE:
#   1. CORE HA CONFIG (default_config, recorder, automation include)
#   2. BINARY SENSORS (equipment firing detection, debounced presence)
#   3. TRUTH SENSORS — LIVING ROOM (temp, humidity, CO2, diagnostics)
#   4. TRUTH SENSORS — MASTER BEDROOM (temp, humidity)
#   5. TRUTH SENSORS — LINCOLN'S ROOM (temp, humidity, outlier, diagnostics)
#   6. TRUTH SENSORS — LILLY'S ROOM (temp, humidity)
#   7. TRUTH SENSORS — OFFICE (temp, humidity, CO2)
#   8. TRUTH SENSORS — LAUNDRY (temp, humidity)
#   9. TRUTH SENSORS — DECK / OUTDOOR (temp, humidity)
#  10. CONTROL WRAPPERS (smoothed pass-through for VTherm / UI)
#  11. RUNTIME TRACKING (history_stats for boiler + all heat pumps)
#  12. SMOOTHED SENSORS (lowpass filter on all truth temps)
#
# DESIGN PRINCIPLES:
#   - Per-room weighted-average truth from multiple physical sensors
#   - 2-hour staleness rejection on all inputs
#   - Outlier rejection (Lincoln pilot, 3°F limit)
#   - Mini-split internal sensors always low-weight (biased hardware)
#   - MSR-2 DPS310 sensors removed (both units hardware-failed)
#   - Smoothed output → control wrapper → VTherm / supervisor
#
# CHANGELOG:
#   V3-FIX:   Corrected entity_id slugification for Lincoln's/Lilly's
#             apostrophe names (lincolns → lincoln_s, lillys → lilly_s)
#   V6.1-FIX: LR delay_off 3min → 20min, Lincoln delay_off 3min → 15min
#   V3.1:     Full audit against HA device registry + telemetry (see below)
#   STEP 2:   Surgical trim of legacy/fallback sensors from weighted truth
#
# =====================================================================
# V3.1 AUDIT CHANGES (April 6, 2026)
# =====================================================================
# REMOVED — 6 phantom entities (never existed in device registry,
#           0 data across 2,500+ telemetry rows since March 14):
#   - sensor.living_room_temperature_temperature  (LR, was w=1.1)
#   - sensor.master_bedroom_temperature_temperature (Master, was w=1.0)
#   - sensor.lincoln_temperature_temperature       (Lincoln, was w=1.0)
#   - sensor.lilly_temperature_temperature         (Lilly, was w=0.9)
#   - sensor.office_temperature_temperature        (Office, was w=0.95)
#   - sensor.downstairs_bathroom_temperature       (Laundry, was w=0.8)
#   + all corresponding humidity phantom entities
#
# ADDED — 3 verified-live sensors not previously in truth calculations
#         (confirmed reporting in Developer Tools April 6, 2026):
#   - sensor.master_bedroom_temp_temperature_2     (7C3F, w=1.0)
#   - sensor.lincoln_temp_temperature              (Outdoor Meter 18, w=1.0)
#   - sensor.laundry_temperature                   (WoTHP, w=1.0)
#   + all corresponding humidity entities
# =====================================================================

# =============================================================================
# SECTION 1: CORE HA CONFIG
# =============================================================================
# ⚠️  DO NOT DELETE — These are foundational HA settings. Without them,
#     integrations won't load, history won't record, and automations
#     won't be included.
# =============================================================================

# homeassistant:
#   packages:
#     climate_v3: !include config/packages/moose_house_climate_v3.yaml

# Loads default set of integrations. Do not remove.
default_config:

timer:
  lr_compressor_cooldown:
    name: "Living Room Compressor Cooldown"
    duration: "00:15:00"
    icon: mdi:timer-sand
  master_compressor_cooldown:
    name: "Master Bedroom Compressor Cooldown"
    duration: "00:15:00"
    icon: mdi:timer-sand
  lincoln_compressor_cooldown:
    name: "Lincoln Compressor Cooldown"
    duration: "00:15:00"
    icon: mdi:timer-sand
  lilly_compressor_cooldown:
    name: "Lilly Compressor Cooldown"
    duration: "00:15:00"
    icon: mdi:timer-sand
  # =============================================================================
  # SECTION 14 HELPERS: V8.4 LR HEATING RECOVERY BOOST
  # =============================================================================
  lr_heating_recovery_boost_max_runtime:
    name: "LR Heating Recovery Max Runtime"
    duration: "01:30:00"
    restore: true
    icon: mdi:timer-alert

recorder:
  purge_keep_days: 30
  commit_interval: 5

automation: !include automations.yaml

# =============================================================================
# SECTION 2: BINARY SENSORS (Equipment Firing + Debounced Presence)
# =============================================================================
# ⚠️  DO NOT DELETE — These binary sensors feed runtime tracking (history_stats)
#     and presence-based automations. Without them, runtime counters break and
#     presence-driven decisions lose their debounce protection.
#
# EQUIPMENT FIRING: Detects when each HVAC unit is actively running.
#   Used by history_stats in Section 11 for daily runtime hours.
#
# DEBOUNCED PRESENCE: Wraps raw MSR-2 Zone 3 occupancy with delay_on/off
#   to prevent flapping. V6.1 tuned LR to 20min off-delay, Lincoln to 15min.
# =============================================================================

template:
  - binary_sensor:
      - name: "Boiler Firing"
        unique_id: boiler_firing
        state: "{{ state_attr('climate.dining_room', 'hvac_action') == 'heating' }}"

      - name: "LR Heat Pump Firing"
        unique_id: lr_heat_pump_firing
        state: "{{ states('climate.living_room_air') not in ['off', 'unavailable', 'unknown'] }}"

      - name: "Master Heat Pump Firing"
        unique_id: master_heat_pump_firing
        state: "{{ states('climate.master_bedroom_air') not in ['off', 'unavailable', 'unknown'] }}"

      - name: "Lincoln Heat Pump Firing"
        unique_id: lincoln_heat_pump_firing
        state: "{{ states('climate.lincoln_air') not in ['off', 'unavailable', 'unknown'] }}"

      - name: "Lilly Heat Pump Firing"
        unique_id: lilly_heat_pump_firing
        state: "{{ states('climate.lilly_air') not in ['off', 'unavailable', 'unknown'] }}"

      # =========================================================
      # DEBOUNCED PRESENCE (V6 FIX — V6.1 TUNED)
      # =========================================================
      - name: "Living Room Presence Debounced"
        unique_id: lr_presence_debounced_v3
        device_class: occupancy
        state: >
          {{ is_state('binary_sensor.living_room_msr_radar_zone_3_occupancy', 'on') }}
        delay_on: "00:00:05"
        delay_off: "00:20:00"

      - name: "Lincoln Presence Debounced"
        unique_id: lincoln_presence_debounced_v3
        device_class: occupancy
        state: >
          {{ is_state('binary_sensor.lincoln_msr_radar_zone_3_occupancy', 'on') }}
        delay_on: "00:00:05"
        delay_off: "00:15:00"

  - sensor:
      # =========================================================
      # SECTION 3: TRUTH SENSORS — LIVING ROOM
      # =========================================================
      # ⚠️  DO NOT DELETE — LR truth feeds the main supervisor, safety
      #     gates (meatlocker/overcool), and the smoothed control sensor.
      #     Without this, the supervisor loses its primary first-floor input.
      #
      # ACTIVE SENSORS (V3.1):
      #   hub_temperature          (SwitchBot Hub 2, Hue room)   w=1.0
      #   hub_temperature_2        (WonderLabs Hub)              w=0.9
      #   hub_2_tempsensor_temperature (SwitchBot Hub 2)         w=1.0
      #   living_room_air_temperature  (Samsung internal, -10°F) w=0.20
      #
      # REMOVED (V3.1):
      #   living_room_temperature_temperature — phantom, never existed
      # =========================================================
      - name: "Living Room Temperature Truth"
        unique_id: living_room_temperature_truth_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {% set fresh = namespace(count=0) %}
          {% set max_age = 7200 %}
          {% set hub = states('sensor.hub_temperature') | float(none) %}
          {% if hub is not none and (now() - states.sensor.hub_temperature.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {% set hub2_legacy = states('sensor.hub_temperature_2') | float(none) %}
          {% if hub2_legacy is not none and (now() - states.sensor.hub_temperature_2.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {% set hub2 = states('sensor.hub_2_tempsensor_temperature') | float(none) %}
          {% if hub2 is not none and (now() - states.sensor.hub_2_tempsensor_temperature.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {% set hp = states('sensor.living_room_air_temperature') | float(none) %}
          {% if hp is not none and (now() - states.sensor.living_room_air_temperature.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {{ fresh.count > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set hub = states('sensor.hub_temperature') | float(none) %}
          {% set hub_ok = hub is not none and (now() - states.sensor.hub_temperature.last_changed).total_seconds() < max_age %}
          {% set hub2_legacy = states('sensor.hub_temperature_2') | float(none) %}
          {% set hub2_legacy_ok = hub2_legacy is not none and (now() - states.sensor.hub_temperature_2.last_changed).total_seconds() < max_age %}
          {% set hub2 = states('sensor.hub_2_tempsensor_temperature') | float(none) %}
          {% set hub2_ok = hub2 is not none and (now() - states.sensor.hub_2_tempsensor_temperature.last_changed).total_seconds() < max_age %}
          {% set hp = states('sensor.living_room_air_temperature') | float(none) %}
          {% set hp_ok = hp is not none and (now() - states.sensor.living_room_air_temperature.last_changed).total_seconds() < max_age %}
          {% set ns = namespace(total=0.0, weight=0.0) %}
          {% if hub_ok %}{% set ns.total = ns.total + (hub * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if hub2_legacy_ok %}{% set ns.total = ns.total + (hub2_legacy * 0.9) %}{% set ns.weight = ns.weight + 0.9 %}{% endif %}
          {% if hub2_ok %}{% set ns.total = ns.total + (hub2 * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if hp_ok %}{% set ns.total = ns.total + (hp * 0.20) %}{% set ns.weight = ns.weight + 0.20 %}{% endif %}
          {{ (ns.total / ns.weight) | round(2) }}

      - name: "Living Room Humidity Truth"
        unique_id: living_room_humidity_truth_v3
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        availability: >
          {% set fresh = namespace(count=0) %}
          {% set max_age = 7200 %}
          {% set hub = states('sensor.hub_humidity') | float(none) %}
          {% if hub is not none and (now() - states.sensor.hub_humidity.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {% set hub2_legacy = states('sensor.hub_humidity_2') | float(none) %}
          {% if hub2_legacy is not none and (now() - states.sensor.hub_humidity_2.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {% set hub2 = states('sensor.hub_2_humisensor_humidity') | float(none) %}
          {% if hub2 is not none and (now() - states.sensor.hub_2_humisensor_humidity.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {% set hp = states('sensor.living_room_air_humidity') | float(none) %}
          {% if hp is not none and (now() - states.sensor.living_room_air_humidity.last_changed).total_seconds() < max_age %}{% set fresh.count = fresh.count + 1 %}{% endif %}
          {{ fresh.count > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set hub = states('sensor.hub_humidity') | float(none) %}
          {% set hub_ok = hub is not none and (now() - states.sensor.hub_humidity.last_changed).total_seconds() < max_age %}
          {% set hub2_legacy = states('sensor.hub_humidity_2') | float(none) %}
          {% set hub2_legacy_ok = hub2_legacy is not none and (now() - states.sensor.hub_humidity_2.last_changed).total_seconds() < max_age %}
          {% set hub2 = states('sensor.hub_2_humisensor_humidity') | float(none) %}
          {% set hub2_ok = hub2 is not none and (now() - states.sensor.hub_2_humisensor_humidity.last_changed).total_seconds() < max_age %}
          {% set hp = states('sensor.living_room_air_humidity') | float(none) %}
          {% set hp_ok = hp is not none and (now() - states.sensor.living_room_air_humidity.last_changed).total_seconds() < max_age %}
          {% set ns = namespace(total=0.0, weight=0.0) %}
          {% if hub_ok %}{% set ns.total = ns.total + (hub * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if hub2_legacy_ok %}{% set ns.total = ns.total + (hub2_legacy * 0.9) %}{% set ns.weight = ns.weight + 0.9 %}{% endif %}
          {% if hub2_ok %}{% set ns.total = ns.total + (hub2 * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if hp_ok %}{% set ns.total = ns.total + (hp * 0.25) %}{% set ns.weight = ns.weight + 0.25 %}{% endif %}
          {{ (ns.total / ns.weight) | round(1) }}

      - name: "Living Room CO2 Truth"
        unique_id: living_room_co2_truth_v3
        unit_of_measurement: "ppm"
        device_class: carbon_dioxide
        state_class: measurement
        availability: >
          {{ states('sensor.living_room_msr_co2') | float(none) is not none and (now() - states.sensor.living_room_msr_co2.last_changed).total_seconds() < 10800 }}
        state: >
          {{ states('sensor.living_room_msr_co2') | float(none) | round(0) }}

      - name: "Living Room Temperature Truth Contributors"
        unique_id: living_room_temperature_truth_contributors_v3
        state: >
          {% set max_age = 7200 %}
          {% set parts = namespace(items=[]) %}
          {% set hub = states('sensor.hub_temperature') | float(none) %}
          {% if hub is not none and (now() - states.sensor.hub_temperature.last_changed).total_seconds() < max_age %}{% set parts.items = parts.items + ['hub_temperature'] %}{% endif %}
          {% set hub2_legacy = states('sensor.hub_temperature_2') | float(none) %}
          {% if hub2_legacy is not none and (now() - states.sensor.hub_temperature_2.last_changed).total_seconds() < max_age %}{% set parts.items = parts.items + ['hub_temperature_2'] %}{% endif %}
          {% set hub2 = states('sensor.hub_2_tempsensor_temperature') | float(none) %}
          {% if hub2 is not none and (now() - states.sensor.hub_2_tempsensor_temperature.last_changed).total_seconds() < max_age %}{% set parts.items = parts.items + ['hub_2_tempsensor_temperature'] %}{% endif %}
          {% set hp = states('sensor.living_room_air_temperature') | float(none) %}
          {% if hp is not none and (now() - states.sensor.living_room_air_temperature.last_changed).total_seconds() < max_age %}{% set parts.items = parts.items + ['living_room_air_temperature'] %}{% endif %}
          {{ parts.items | join(', ') if parts.items | length > 0 else 'none' }}

      - name: "Living Room Temperature Truth Active Count"
        unique_id: living_room_temperature_truth_active_count_v3
        state: >
          {% set max_age = 7200 %}
          {% set count = namespace(v=0) %}
          {% set hub = states('sensor.hub_temperature') | float(none) %}
          {% if hub is not none and (now() - states.sensor.hub_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set hub2_legacy = states('sensor.hub_temperature_2') | float(none) %}
          {% if hub2_legacy is not none and (now() - states.sensor.hub_temperature_2.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set hub2 = states('sensor.hub_2_tempsensor_temperature') | float(none) %}
          {% if hub2 is not none and (now() - states.sensor.hub_2_tempsensor_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set hp = states('sensor.living_room_air_temperature') | float(none) %}
          {% if hp is not none and (now() - states.sensor.living_room_air_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {{ count.v }}

      # =========================================================
      # SECTION 4: TRUTH SENSORS — MASTER BEDROOM
      # =========================================================
      # ⚠️  DO NOT DELETE — Master BR truth feeds the main supervisor
      #     and safety ceiling gates. In V8 summer doctrine, Master is
      #     the primary cooling engine / thermal shield.
      #
      # ACTIVE SENSORS (STEP 2):
      #   master_bedroom_temp_temperature_2  (I/O Meter 7C3F)   w=1.0
      #   master_bedroom_temperature_temperature_2 (WonderLabs) w=0.9
      #   master_bedroom_air_temperature     (Samsung, +6.9°F)  w=0.20
      #
      # REMOVED (STEP 2):
      #   master_bedroom_temp_temperature (Outdoor Meter 3F)
      # =========================================================
      - name: "Master Bedroom Temperature Truth"
        unique_id: master_bedroom_temperature_truth_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set count = namespace(v=0) %}
          {% set s1 = states('sensor.master_bedroom_temp_temperature_2') | float(none) %}
          {% if s1 is not none and (now() - states.sensor.master_bedroom_temp_temperature_2.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set s2 = states('sensor.master_bedroom_temperature_temperature_2') | float(none) %}
          {% if s2 is not none and (now() - states.sensor.master_bedroom_temperature_temperature_2.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set hp = states('sensor.master_bedroom_air_temperature') | float(none) %}
          {% if hp is not none and (now() - states.sensor.master_bedroom_air_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {{ count.v > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.master_bedroom_temp_temperature_2') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.master_bedroom_temp_temperature_2.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.master_bedroom_temperature_temperature_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.master_bedroom_temperature_temperature_2.last_changed).total_seconds() < max_age %}
          {% set hp = states('sensor.master_bedroom_air_temperature') | float(none) %}
          {% set hp_ok = hp is not none and (now() - states.sensor.master_bedroom_air_temperature.last_changed).total_seconds() < max_age %}
          {% set ns = namespace(total=0.0, weight=0.0) %}
          {% if s1_ok %}{% set ns.total = ns.total + (s1 * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if s2_ok %}{% set ns.total = ns.total + (s2 * 0.9) %}{% set ns.weight = ns.weight + 0.9 %}{% endif %}
          {% if hp_ok %}{% set ns.total = ns.total + (hp * 0.20) %}{% set ns.weight = ns.weight + 0.20 %}{% endif %}
          {{ (ns.total / ns.weight) | round(2) }}

      - name: "Master Bedroom Humidity Truth"
        unique_id: master_bedroom_humidity_truth_v3
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set count = namespace(v=0) %}
          {% set s1 = states('sensor.master_bedroom_temp_humidity_2') | float(none) %}
          {% if s1 is not none and (now() - states.sensor.master_bedroom_temp_humidity_2.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set s2 = states('sensor.master_bedroom_temperature_humidity_2') | float(none) %}
          {% if s2 is not none and (now() - states.sensor.master_bedroom_temperature_humidity_2.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set hp = states('sensor.master_bedroom_air_humidity') | float(none) %}
          {% if hp is not none and (now() - states.sensor.master_bedroom_air_humidity.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {{ count.v > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.master_bedroom_temp_humidity_2') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.master_bedroom_temp_humidity_2.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.master_bedroom_temperature_humidity_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.master_bedroom_temperature_humidity_2.last_changed).total_seconds() < max_age %}
          {% set hp = states('sensor.master_bedroom_air_humidity') | float(none) %}
          {% set hp_ok = hp is not none and (now() - states.sensor.master_bedroom_air_humidity.last_changed).total_seconds() < max_age %}
          {% set ns = namespace(total=0.0, weight=0.0) %}
          {% if s1_ok %}{% set ns.total = ns.total + (s1 * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if s2_ok %}{% set ns.total = ns.total + (s2 * 0.9) %}{% set ns.weight = ns.weight + 0.9 %}{% endif %}
          {% if hp_ok %}{% set ns.total = ns.total + (hp * 0.25) %}{% set ns.weight = ns.weight + 0.25 %}{% endif %}
          {{ (ns.total / ns.weight) | round(1) }}

      # =========================================================
      # SECTION 5: TRUTH SENSORS — LINCOLN'S ROOM
      # =========================================================
      # ⚠️  DO NOT DELETE — Lincoln truth feeds the main supervisor,
      #     safety ceiling gates, ghost assassin, and comfort fan.
      #     Lincoln is the pilot room for outlier rejection logic.
      #
      # ACTIVE SENSORS (STEP 2):
      #   lincoln_s_temp_temperature          (I/O Meter 3618)    w=1.0
      #   lincoln_s_room_temperature_temperature (WonderLabs)     w=1.0
      #   lincoln_temp_temperature             (Outdoor Meter 18) w=1.0
      #   lincoln_air_temperature              (Samsung, +4.7°F)  w=0.20
      #
      # REMOVED (V3.1):
      #
      # OUTLIER REJECTION: 3°F limit against base mean of primary sensors.
      #   Samsung is excluded from outlier calc (always passes if fresh).
      # =========================================================
      - name: "Lincoln's Room Temperature Truth"
        unique_id: lincoln_s_room_temperature_truth_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set count = namespace(v=0) %}
          {% set s1 = states('sensor.lincoln_s_temp_temperature') | float(none) %}
          {% if s1 is not none and (now() - states.sensor.lincoln_s_temp_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set s2 = states('sensor.lincoln_s_room_temperature_temperature') | float(none) %}
          {% if s2 is not none and (now() - states.sensor.lincoln_s_room_temperature_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set s3 = states('sensor.lincoln_temp_temperature') | float(none) %}
          {% if s3 is not none and (now() - states.sensor.lincoln_temp_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set hp = states('sensor.lincoln_air_temperature') | float(none) %}
          {% if hp is not none and (now() - states.sensor.lincoln_air_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {{ count.v > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set outlier_limit = 3.0 %}

          {% set s1 = states('sensor.lincoln_s_temp_temperature') | float(none) %}
