      # =========================================================
      # SECTION 9: TRUTH SENSORS — DECK / OUTDOOR
      # =========================================================
      # ⚠️  DO NOT DELETE — Deck truth is the outdoor reference for
      #     the entire system. The main supervisor, auto season mode,
      #     and deep-freeze boiler logic all depend on this sensor.
      #     If both deck sensors die, the supervisor defaults to 50°F.
      #
      # ACTIVE SENSORS:
      #   deck_temp_temperature_3  (SwitchBot Outdoor Meter — Matter)  w=equal
      #   deck_temp_temperature_2  (WonderLabs WoIOSensor — ST)        w=equal
      #
      # REMOVED:
      #   deck_temp_temperature    (BT — pruned from registry, RF-attenuated)
      # =========================================================
      - name: "Deck Temperature Truth"
        unique_id: deck_temperature_truth_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.deck_temp_temperature_3') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.deck_temp_temperature_3.last_reported).total_seconds() < max_age %}
          {% set s2 = states('sensor.deck_temp_temperature_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.deck_temp_temperature_2.last_reported).total_seconds() < max_age %}
          {{ s1_ok or s2_ok }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.deck_temp_temperature_3') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.deck_temp_temperature_3.last_reported).total_seconds() < max_age %}
          {% set s2 = states('sensor.deck_temp_temperature_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.deck_temp_temperature_2.last_reported).total_seconds() < max_age %}
          {% if s1_ok and s2_ok %}
            {{ ((s1 + s2) / 2) | round(2) }}
          {% elif s1_ok %}
            {{ s1 | round(2) }}
