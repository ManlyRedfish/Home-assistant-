  # =============================================================================
  # SECTION 12: SMOOTHED SENSORS
  # =============================================================================
  # ⚠️  DO NOT DELETE — These lowpass filters smooth the raw truth sensors
  #     to prevent control jitter. The control wrappers in Section 10 read
  #     from these, and the V8.3 supervisor ultimately acts on the
  #     smoothed values. Removing these causes noisy truth spikes to
  #     propagate directly into setpoint decisions.
  #
  # FILTER: lowpass, time_constant=10, precision=2
  # INPUTS: Truth sensors from Sections 3–9
  # OUTPUTS: sensor.*_temperature_smoothed → Section 10 control wrappers
  # =============================================================================
  - platform: filter
    name: "Living Room Temperature Smoothed"
    entity_id: sensor.living_room_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Master Bedroom Temperature Smoothed"
    entity_id: sensor.master_bedroom_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Lincoln's Room Temperature Smoothed"
    unique_id: lincoln_s_room_temperature_smoothed
    entity_id: sensor.lincoln_s_room_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Lilly's Room Temperature Smoothed"
    unique_id: lilly_s_room_temperature_smoothed
    entity_id: sensor.lilly_s_room_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Office Temperature Smoothed"
    entity_id: sensor.office_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Laundry Temperature Smoothed"
    entity_id: sensor.laundry_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Deck Temperature Smoothed"
    entity_id: sensor.deck_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

# =============================================================================
# SECTION 14 HELPERS: V8.4 LR HEATING RECOVERY BOOST
# =============================================================================
input_boolean:
  lr_heating_recovery_boost_active:
    name: "LR Heating Recovery Active"
    icon: mdi:fire-alert
  # ---------------------------------------------------------------------------
  # HEAT WAVE OVERRIDE master switch (automations.yaml Section 19).
  # Turning this ON forces all four Samsung heads to cool / 61°F / turbo for 96h
  # and gates the comfort/supervisor automations (Section 2 supervisor, Section 5
  # auto season mode, Section 6 fan destratification). Section 3 hard-safety
  # gates remain active and untouched. No `initial:` on purpose — an in-progress
  # override must survive an HA restart (the startup reassert automation
  # re-checks the deadline and self-clears if it has passed).
  # ---------------------------------------------------------------------------
  heat_wave_override:
    name: "Heat Wave Override"
    icon: mdi:weather-sunny-alert
  # ---------------------------------------------------------------------------
  # SECTION 16 HELPER: V9-E MASTER PRE-COOL nightly abort latch.
  # No `initial:` on purpose — a tripped latch must survive an HA restart
  # mid-night (a restart must not silently re-arm an aborted experiment).
  # The Section 16 reset automation clears it daily at 22:00.
  # ---------------------------------------------------------------------------
  precool_aborted_tonight:
    name: "Precool Aborted Tonight"
    icon: mdi:snowflake-alert

# =============================================================================
# SECTION 14 OBSERVABILITY HELPERS (v5.5)
# =============================================================================
# ⚠️  Observability-only — issue #62.
#     These helpers persist last-edge memory of Section 14 engage / release
#     events so the v5.5 telemetry export can classify boost cycles directly
#     instead of inferring them from LR_Air_Setpoint=77.
#     They are written by Section 14's engage/release action blocks AFTER the
#     control actions complete. They do not gate, change, or interrupt any
#     Section 14 trigger, condition, climate command, timer call, or latch
#     flip. No threshold change. No #49 closure.
# =============================================================================
input_text:
  lr_heating_recovery_boost_last_engage_reason:
    name: "LR Boost Last Engage Reason"
    icon: mdi:play-circle-outline
    initial: ""
    max: 64
  lr_heating_recovery_boost_last_release_reason:
    name: "LR Boost Last Release Reason"
    icon: mdi:stop-circle-outline
    initial: ""
    max: 64
  # ---------------------------------------------------------------------------
  # SECTION 16 HELPER: V9-E MASTER PRE-COOL abort-reason memory.
  # No `initial:` on purpose — the forensic reason must survive an HA
  # restart together with the abort latch above. The Section 16 reset
  # automation rewrites it to "ready" daily at 22:00.
  # ---------------------------------------------------------------------------
  precool_abort_reason:
    name: "Precool Abort Reason"
    icon: mdi:snowflake-melt
    max: 255

input_datetime:
  lr_heating_recovery_boost_last_engage_at:
    name: "LR Boost Last Engage At"
    icon: mdi:clock-start
    has_date: true
    has_time: true
  lr_heating_recovery_boost_last_release_at:
    name: "LR Boost Last Release At"
    icon: mdi:clock-end
    has_date: true
    has_time: true
  # ---------------------------------------------------------------------------
  # HEAT WAVE OVERRIDE absolute deadline (automations.yaml Section 19).
  # Records when the active 96h override is scheduled to expire. The countdown
  # of record is timer.heat_wave_override_96h; this absolute timestamp is the
  # missed-event backstop: if HA is offline when the timer would have fired its
  # `timer.finished` event, the homeassistant-start reassert compares now() to
  # this deadline and self-clears the override instead of reasserting it. No
  # `initial:` — it must persist across restarts like the latch it backstops.
  # ---------------------------------------------------------------------------
  heat_wave_override_deadline:
    name: "Heat Wave Override Deadline"
    icon: mdi:calendar-clock
    has_date: true
    has_time: true

# =============================================================================
# SECTION 16 HELPERS: V9-E MASTER PRE-COOL (Evidence-Gated Runtime Experiment)
# =============================================================================
# Helpers for the V9 Exception Master pre-cool experiment (automations.yaml
# Sections 2 + 16; docs/v9_v10_goals.md §2.6). YAML-defined to match the
# Section 14 helper precedent in this file.
#
# `initial:` policy (deliberate, two classes):
#   - TUNABLES (target/floor/drop-limit/max-runtime) declare `initial:` so the
#     experiment envelope re-asserts its documented thresholds on every HA
#     restart. Deterministic thresholds keep the telemetry interpretable.
#   - STATE/MEMORY helpers (runtime counter, previous-master slope memory —
#     plus the latch and reason above) omit `initial:` so envelope state
#     survives a mid-night restart. A restart must not refill the runtime
#     budget or clear a tripped latch. The Section 16 reset automation
#     re-initializes all of them daily at 22:00.
#
# precool_target_temp is a ROOM-TRUTH cutoff (comfort threshold), not the
# Samsung actuator setpoint. Pre-cool commands keep the 61°F shove doctrine.
# =============================================================================
input_number:
  precool_runtime_counter:
    name: "Precool Runtime Counter"
    icon: mdi:timer-outline
    min: 0
    max: 720
    step: 15
    unit_of_measurement: "min"
  precool_previous_master_temp:
    name: "Precool Previous Master Temp"
    icon: mdi:history
    min: 50
    max: 90
    step: 0.1
    unit_of_measurement: "°F"
  precool_target_temp:
    name: "Precool Target Temp"
    icon: mdi:thermometer-low
    min: 62
    max: 68
    step: 0.5
    initial: 64
    unit_of_measurement: "°F"
  precool_thermal_floor:
    name: "Precool Thermal Floor"
    icon: mdi:thermometer-alert
    min: 60
    max: 65
    step: 0.5
    initial: 63.5
    unit_of_measurement: "°F"

# =============================================================================
# SECTION 19 HELPER: HEAT WAVE OVERRIDE — APPLY SCRIPT
# =============================================================================
# ⚠️  This is the ONLY script in this config; it is the actuator for the
#     operator-driven "Heat Wave Override — 96h" (automations.yaml Section 19).
#     It is YAML-defined here (top-level `script:`) to match this repo's
#     inline-helper convention — timers, input_booleans, input_datetimes and
#     input_numbers are all defined inline in this file rather than in separate
#     include files, and there is no scripts.yaml include.
#
# WHAT IT DOES:
#   Commands each of the four Samsung mini-split heads to cool / 61°F / turbo,
#   using the repo's known-good Samsung actuator pattern (Section 2): a single
#   climate.set_temperature carrying BOTH hvac_mode: cool and temperature: 61,
#   followed by a SEPARATE climate.set_fan_mode for fan_mode: turbo. Dining/Nest
#   (climate.dining_room) is heat-only and is intentionally never touched.
#
# PER-ROOM SAFETY GUARDS (defense in depth — these do NOT replace Section 3):
#   The script never blindly fights the hard safety gates. Each head is only
#   commanded when its canonical room-truth sensor is VALID, and:
#     - Living Room: only if truth > 60°F  (respects v8_2_lr_runaway_cooling_cutoff)
#     - Master:      only if truth > 58°F  (respects v8_2_master_emergency_floor)
#     - Lincoln/Lilly: only if truth is valid (no new permanent low floor invented;
#                      Section 3 ceiling/failsafe gates and the existing doctrine
#                      remain the authority for these rooms).
#   "Valid" means a finite, in-range number (matches the Section 3 / V8.6
#   truth-validity test: not none/NaN, between -90 and 200). When a guard fails
#   the script simply skips that head — it never issues a competing command, so
#   a fired runaway/floor cutoff is left to hold the head off.
# =============================================================================
script:
  heat_wave_override_apply:
    alias: "Heat Wave Override: Apply cool/61/turbo to all heads"
    icon: mdi:weather-sunny-alert
    mode: single
    sequence:
      - variables:
          # Canonical room-truth entities, discovered from the Section 3 safety
          # automations (v8_2_* cutoffs, v8_6* failsafes). Kept in sync with them.
          lr_truth: "{{ states('sensor.living_room_temperature_truth') | float(none) }}"
          master_truth: "{{ states('sensor.master_bedroom_temperature_truth') | float(none) }}"
          lincoln_truth: "{{ states('sensor.lincoln_s_room_temperature_truth') | float(none) }}"
          lilly_truth: "{{ states('sensor.lilly_s_room_temperature_truth') | float(none) }}"
      # ----- LIVING ROOM: command only if truth valid AND > 60°F -----
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {% set x = lr_truth %}
                  {{ x is not none and x == x and x > -90 and x < 200 and x > 60 }}
            sequence:
              - action: climate.set_temperature
                target: { entity_id: climate.living_room_air }
                data: { hvac_mode: "cool", temperature: 61 }
              - action: climate.set_fan_mode
                target: { entity_id: climate.living_room_air }
                data: { fan_mode: "turbo" }
      # ----- MASTER: command only if truth valid AND > 58°F -----
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {% set x = master_truth %}
                  {{ x is not none and x == x and x > -90 and x < 200 and x > 58 }}
            sequence:
              - action: climate.set_temperature
                target: { entity_id: climate.master_bedroom_air }
                data: { hvac_mode: "cool", temperature: 61 }
              - action: climate.set_fan_mode
                target: { entity_id: climate.master_bedroom_air }
                data: { fan_mode: "turbo" }
      # ----- LINCOLN: command only if truth valid (no invented low floor) -----
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {% set x = lincoln_truth %}
                  {{ x is not none and x == x and x > -90 and x < 200 }}
            sequence:
              - action: climate.set_temperature
                target: { entity_id: climate.lincoln_air }
                data: { hvac_mode: "cool", temperature: 61 }
              - action: climate.set_fan_mode
                target: { entity_id: climate.lincoln_air }
                data: { fan_mode: "turbo" }
      # ----- LILLY: command only if truth valid (no invented low floor) -----
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {% set x = lilly_truth %}
                  {{ x is not none and x == x and x > -90 and x < 200 }}
            sequence:
              - action: climate.set_temperature
                target: { entity_id: climate.lilly_air }
                data: { hvac_mode: "cool", temperature: 61 }
              - action: climate.set_fan_mode
                target: { entity_id: climate.lilly_air }
                data: { fan_mode: "turbo" }
