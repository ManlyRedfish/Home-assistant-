  # =============================================================================
  # SECTION 16 FORECAST CACHE: V9-E MASTER PRE-COOL (Evidence-Gated Experiment)
  # =============================================================================
  # Trigger-based forecast cache for the V9 Exception Master pre-cool
  # experiment (automations.yaml Sections 2 + 16). Calls weather.get_forecasts
  # hourly (and on HA start) and caches tomorrow's forecast daily high.
  # This is the supported pattern — the legacy state_attr(weather.x,
  # 'forecast') attribute no longer exists; do not regress to it.
  #
  # Fallback ladder: tomorrow's forecast temperature → own last value →
  # 70°F (a value below the 85°F heatwave gate, so a dead forecast source
  # fails SAFE: pre-cool simply never arms).
  #
  # ⚠️ DEPLOY VERIFY: confirm weather.forecast_home exists on the live HA
  # instance (it is the default Met.no entity). It is not referenced
  # anywhere else in this repo, so it could not be verified offline.
  - triggers:
      - trigger: time_pattern
        hours: "/1"
      - trigger: homeassistant
        event: start
    actions:
      - action: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: daily
        response_variable: daily_forecast
    sensor:
      - name: Precool Tomorrow High
        unique_id: precool_tomorrow_high
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°F"
        availability: >
          {{ daily_forecast is defined }}
        state: >
          {% set f = daily_forecast.get('weather.forecast_home', {}).get('forecast', []) %}
          {% if f | length > 1 and f[1].temperature is defined %}
            {{ f[1].temperature | float }}
          {% elif has_value('sensor.precool_tomorrow_high') %}
            {{ states('sensor.precool_tomorrow_high') }}
          {% else %}
            70
          {% endif %}

sensor:
  # =============================================================================
  # SECTION 11: RUNTIME TRACKING
  # =============================================================================
  # ⚠️  DO NOT DELETE — These history_stats sensors count daily hours of
  #     operation for the boiler and each heat pump head. They feed the
  #     telemetry pipeline (automations.yaml Section 1) and are essential
  #     for V8 experiment analysis (runtime vs comfort correlation).
  #
  # DEPENDS ON: Binary sensors in Section 2 (boiler_firing, *_heat_pump_firing)
  # =============================================================================
  - platform: history_stats
    name: "Boiler Runtime Today"
    entity_id: binary_sensor.boiler_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "LR HP Runtime Today"
    entity_id: binary_sensor.lr_heat_pump_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
