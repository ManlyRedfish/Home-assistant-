          {% if s2 is not none and (now() - states.sensor.bathroom_downstairs_temperature.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {{ count.v > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.laundry_temperature') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.laundry_temperature.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.bathroom_downstairs_temperature') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.bathroom_downstairs_temperature.last_changed).total_seconds() < max_age %}
          {% set ns = namespace(total=0.0, weight=0.0) %}
          {% if s1_ok %}{% set ns.total = ns.total + (s1 * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if s2_ok %}{% set ns.total = ns.total + (s2 * 0.8) %}{% set ns.weight = ns.weight + 0.8 %}{% endif %}
          {{ (ns.total / ns.weight) | round(2) }}

      - name: "Laundry Humidity Truth"
        unique_id: laundry_humidity_truth_v3
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set count = namespace(v=0) %}
          {% set s1 = states('sensor.laundry_humidity') | float(none) %}
          {% if s1 is not none and (now() - states.sensor.laundry_humidity.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set s2 = states('sensor.bathroom_downstairs_humidity') | float(none) %}
          {% if s2 is not none and (now() - states.sensor.bathroom_downstairs_humidity.last_changed).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {{ count.v > 0 }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.laundry_humidity') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.laundry_humidity.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.bathroom_downstairs_humidity') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.bathroom_downstairs_humidity.last_changed).total_seconds() < max_age %}
          {% set ns = namespace(total=0.0, weight=0.0) %}
          {% if s1_ok %}{% set ns.total = ns.total + (s1 * 1.0) %}{% set ns.weight = ns.weight + 1.0 %}{% endif %}
          {% if s2_ok %}{% set ns.total = ns.total + (s2 * 0.8) %}{% set ns.weight = ns.weight + 0.8 %}{% endif %}
          {{ (ns.total / ns.weight) | round(1) }}

      # =========================================================
      # SECTION 9: TRUTH SENSORS — DECK / OUTDOOR
      # =========================================================
      # ⚠️  DO NOT DELETE — Deck truth is the outdoor reference for
      #     the entire system. The main supervisor, auto season mode,
      #     and deep-freeze boiler logic all depend on this sensor.
      #     If both deck sensors die, the supervisor defaults to 50°F.
      #
      # ACTIVE SENSORS (STEP 2):
      #   deck_temp_temperature    (SwitchBot Outdoor Meter 4481) w=equal
      #   deck_temp_temperature_2  (WonderLabs WoIOSensor)        w=equal
      #
      # REMOVED (STEP 2):
      #   deck_temp_temperature_3  (SwitchBot Outdoor Meter 81)
      # =========================================================
      - name: "Deck Temperature Truth"
        unique_id: deck_temperature_truth_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.deck_temp_temperature') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.deck_temp_temperature.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.deck_temp_temperature_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.deck_temp_temperature_2.last_changed).total_seconds() < max_age %}
          {{ s1_ok or s2_ok }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.deck_temp_temperature') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.deck_temp_temperature.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.deck_temp_temperature_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.deck_temp_temperature_2.last_changed).total_seconds() < max_age %}
          {% if s1_ok and s2_ok %}
            {{ ((s1 + s2) / 2) | round(2) }}
          {% elif s1_ok %}
            {{ s1 | round(2) }}
          {% else %}
            {{ s2 | round(2) }}
          {% endif %}

      - name: "Deck Humidity Truth"
        unique_id: deck_humidity_truth_v3
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.deck_temp_humidity') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.deck_temp_humidity.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.deck_temp_humidity_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.deck_temp_humidity_2.last_changed).total_seconds() < max_age %}
          {{ s1_ok or s2_ok }}
        state: >
          {% set max_age = 7200 %}
          {% set s1 = states('sensor.deck_temp_humidity') | float(none) %}
          {% set s1_ok = s1 is not none and (now() - states.sensor.deck_temp_humidity.last_changed).total_seconds() < max_age %}
          {% set s2 = states('sensor.deck_temp_humidity_2') | float(none) %}
          {% set s2_ok = s2 is not none and (now() - states.sensor.deck_temp_humidity_2.last_changed).total_seconds() < max_age %}
          {% if s1_ok and s2_ok %}
            {{ ((s1 + s2) / 2) | round(1) }}
          {% elif s1_ok %}
            {{ s1 | round(1) }}
          {% else %}
            {{ s2 | round(1) }}
          {% endif %}

      # =========================================================
      # SECTION 10: CONTROL WRAPPERS FOR VTHERM / UI
      # =========================================================
      # ⚠️  DO NOT DELETE — These sensors pass smoothed truth values
      #     through a template with unique_id so VTherm and the HA UI
      #     can manage them as distinct entities. Without these, VTherm
      #     loses its temperature input and control stops working.
      #
      # Each wrapper reads from the corresponding smoothed sensor
      # in Section 12 and exposes it with a stable unique_id.
      # =========================================================
      - name: "Living Room Temperature Control"
        unique_id: living_room_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.living_room_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.living_room_temperature_smoothed') | float(none) | round(2) }}

      - name: "Master Bedroom Temperature Control"
        unique_id: master_bedroom_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.master_bedroom_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.master_bedroom_temperature_smoothed') | float(none) | round(2) }}

      - name: "Lincoln's Room Temperature Control"
        unique_id: lincoln_s_room_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.lincoln_s_room_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.lincoln_s_room_temperature_smoothed') | float(none) | round(2) }}

      - name: "Lilly's Room Temperature Control"
        unique_id: lilly_s_room_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.lilly_s_room_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.lilly_s_room_temperature_smoothed') | float(none) | round(2) }}

      - name: "Office Temperature Control"
        unique_id: office_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.office_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.office_temperature_smoothed') | float(none) | round(2) }}

      - name: "Laundry Temperature Control"
        unique_id: laundry_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.laundry_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.laundry_temperature_smoothed') | float(none) | round(2) }}

      - name: "Deck Temperature Control"
        unique_id: deck_temperature_control_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ states('sensor.deck_temperature_smoothed') | float(none) is not none }}
        state: >
          {{ states('sensor.deck_temperature_smoothed') | float(none) | round(2) }}

sensor:
  # =============================================================================
  # SECTION 11: RUNTIME TRACKING
  # =============================================================================
  # ⚠️  DO NOT DELETE — These history_stats sensors count daily hours of
  #     operation for the boiler and each heat pump head. They feed the
  #     telemetry pipeline (automations.yaml Section 1) and are essential
  #     for V8 experiment analysis (runtime vs comfort correlation).
  #
  # DEPENDS ON: Binary sensors in Section 2 (boiler_firing, *_heat_pump_firing)
  # =============================================================================
  - platform: history_stats
    name: "Boiler Runtime Today"
    entity_id: binary_sensor.boiler_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "LR HP Runtime Today"
    entity_id: binary_sensor.lr_heat_pump_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Master HP Runtime Today"
    entity_id: binary_sensor.master_heat_pump_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Lincoln HP Runtime Today"
    entity_id: binary_sensor.lincoln_heat_pump_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Lilly HP Runtime Today"
    entity_id: binary_sensor.lilly_heat_pump_firing
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "LR Presence Today"
    entity_id: binary_sensor.living_room_presence_debounced_v3
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Lincoln Presence Today"
    entity_id: binary_sensor.lincoln_presence_debounced_v3
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  # =============================================================================
  # SECTION 12: SMOOTHED SENSORS
  # =============================================================================
  # ⚠️  DO NOT DELETE — These lowpass filters smooth the raw truth sensors
  #     to prevent control jitter. The control wrappers in Section 10 read
  #     from these, and VTherm / the supervisor ultimately act on the
  #     smoothed values. Removing these causes noisy truth spikes to
  #     propagate directly into setpoint decisions.
  #
  # FILTER: lowpass, time_constant=10, precision=2
  # INPUTS: Truth sensors from Sections 3–9
  # OUTPUTS: sensor.*_temperature_smoothed → Section 10 control wrappers
  # =============================================================================
  - platform: filter
    name: "Living Room Temperature Smoothed"
    entity_id: sensor.living_room_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Master Bedroom Temperature Smoothed"
    entity_id: sensor.master_bedroom_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Lincoln's Room Temperature Smoothed"
    unique_id: lincoln_s_room_temperature_smoothed
    entity_id: sensor.lincoln_s_room_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Lilly's Room Temperature Smoothed"
    unique_id: lilly_s_room_temperature_smoothed
    entity_id: sensor.lilly_s_room_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Office Temperature Smoothed"
    entity_id: sensor.office_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Laundry Temperature Smoothed"
    entity_id: sensor.laundry_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

  - platform: filter
    name: "Deck Temperature Smoothed"
    entity_id: sensor.deck_temperature_truth
    filters:
      - filter: lowpass
        time_constant: 10
        precision: 2

