      # =========================================================
      # SECTION 7: TRUTH SENSORS — OFFICE
      # =========================================================
      # ⚠️  DO NOT DELETE — Office truth provides supplemental whole-house
      #     data. No mini-split serves this room; it relies on ambient
      #     drift from adjacent zones. Netatmo provides CO2 truth.
      #
      # ACTIVE SENSORS (STEP 2):
      #   indoor_temperature      (Netatmo weather station)     w=1.0
      #   office_temp_temperature (Signify/Hue room sensor)     w=0.95
      #   office_temperature_2    (Signify/Hue room sensor)     w=0.95
      #
      # REMOVED (STEP 2):
      #   office_temperature (SwitchBot Outdoor Meter 79)
      #   office_temperature_3 (SwitchBot Outdoor Meter 79 fallback)
      # =========================================================
      - name: "Office Temperature Truth"
        unique_id: office_temperature_truth_v3
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {% set max_age = 7200 %}
          {% set count = namespace(v=0) %}
          {% set s1 = states('sensor.office_temp_temperature') | float(none) %}
          {% if s1 is not none and (now() - states.sensor.office_temp_temperature.last_reported).total_seconds() < max_age %}{% set count.v = count.v + 1 %}{% endif %}
          {% set s2 = states('sensor.office_temperature_2') | float(none) %}
